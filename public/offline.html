<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - HR Portal</title>
  <style>
    :root {
      --bg-app: #f4f6fb;
      --text-1: #111827;
      --text-3: #9ca3af;
      --accent: #3b82f6;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-app: #0b0f19;
        --text-1: #f1f5f9;
        --text-3: #475569;
        --accent: #60a5fa;
        --border: #1e293b;
      }
    }
    body {
      background-color: var(--bg-app);
      color: var(--text-1);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      max-width: 400px;
      padding: 32px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    h1 {
      color: var(--accent);
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      font-weight: 800;
    }
    p {
      color: var(--text-3);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background-color: var(--accent);
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>You are Offline</h1>
    <p>HR Portal offline mode. Please check your internet connection and try again.</p>
    <a href="/" class="btn">Retry Connection</a>
  </div>
</body>
</html>
